name: AI Intraday Trading Tester

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 5 minutes during NSE hours (3:30–10:30 UTC ≈ 9:00–16:00 IST)
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:

jobs:
  run-trading-system:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Python Setup
      # -------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------
      # Cache models + DB
      # -------------------------------
      - name: Cache models and database
        uses: actions/cache@v4
        with:
          path: |
            models/
            data/trades.db
          key: trading-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            trading-${{ runner.os }}-

      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------
      # FIX: Create Google credentials file (CRITICAL)
      # -------------------------------
      - name: Create Google credentials file
        run: |
          printf "%s" '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      # -------------------------------
      # Run trading system
      # -------------------------------
      - name: Run single pipeline cycle
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: service_account.json
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python scheduler.py --once

      # -------------------------------
      # Upload models (artifacts)
      # -------------------------------
      - name: Upload trained models
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ github.run_id }}
          path: models/
          retention-days: 30